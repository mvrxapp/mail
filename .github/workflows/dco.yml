name: DCO

on:
  pull_request:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Signed-off-by trailer on every commit
        run: |
          set -e
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+>$'; then
              echo "::error::Commit $sha is missing a 'Signed-off-by' trailer (DCO). Run: git commit --amend -s (see CONTRIBUTING.md)"
              missing=1
            fi
          done
          exit $missing
